<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ray Tracing: The Rest of Your Life</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 1rem; }
        canvas { background-color: black; box-shadow: 0 4px 15px rgba(0,0,0,0.8); border-radius: 4px; margin-bottom: 1rem; }
        .dashboard { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .control-panel { background: #2a2a2a; padding: 1.5rem; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem; flex: 1; min-width: 250px; }
        .panel-title { font-weight: bold; margin-bottom: 0.5rem; color: #4CAF50; border-bottom: 1px solid #444; padding-bottom: 0.5rem; text-align: center; }
        .control-group { display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
        input[type="range"] { cursor: pointer; width: 120px; }
        input[type="color"] { cursor: pointer; height: 25px; border: none; border-radius: 4px; background: none; }
        #status { font-family: monospace; color: #ffeb3b; font-weight: bold; margin-bottom: 1rem; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>Ray Tracing: The Rest of Your Life</h2>
    <div id="status">Ready</div>
    <canvas id="renderCanvas" width="400" height="400"></canvas> 
    
    <div class="dashboard">
        <div class="control-panel">
            <div class="panel-title">Render Engine</div>
            <div class="control-group">
                <label>Samples/Pixel:</label>
                <div><span id="samplesVal">20</span> <input type="range" id="samplesSlider" min="1" max="200" step="1" value="20"></div>
            </div>
            <div class="control-group">
                <label>Max Bounce Depth:</label>
                <div><span id="depthVal">15</span> <input type="range" id="depthSlider" min="1" max="50" value="15"></div>
            </div>
            <div class="control-group">
                <label>Light Intensity:</label>
                <div><span id="intensityVal">15</span> <input type="range" id="intensitySlider" min="1" max="50" value="15"></div>
            </div>
            <div class="control-group">
                <label>Light Color:</label>
                <input type="color" id="lightColorPicker" value="#ffffff">
            </div>
        </div>

        <div class="control-panel">
            <div class="panel-title">Material Properties</div>
            <div class="control-group">
                <label>Left Metal (Roughness):</label>
                <div><span id="roughnessVal">0.05</span> <input type="range" id="roughnessSlider" min="0" max="1" step="0.05" value="0.05"></div>
            </div>
            <div class="control-group">
                <label>Right Glass (IOR):</label>
                <div><span id="iorVal">1.50</span> <input type="range" id="iorSlider" min="1.0" max="3.0" step="0.05" value="1.50"></div>
            </div>
        </div>
    </div>

<script>
const workerScript = `
    class Vec3 {
        constructor(x, y, z) { this.x = x; this.y = y; this.z = z; }
        add(v) { return new Vec3(this.x + v.x, this.y + v.y, this.z + v.z); }
        sub(v) { return new Vec3(this.x - v.x, this.y - v.y, this.z - v.z); }
        mul(t) { return new Vec3(this.x * t, this.y * t, this.z * t); }
        mulV(v) { return new Vec3(this.x * v.x, this.y * v.y, this.z * v.z); }
        div(t) { return this.mul(1/t); }
        lengthSq() { return this.x*this.x + this.y*this.y + this.z*this.z; }
        length() { return Math.sqrt(this.lengthSq()); }
        normalize() { return this.div(this.length()); }
        static dot(u, v) { return u.x*v.x + u.y*v.y + u.z*v.z; }
        static cross(u, v) { return new Vec3(u.y*v.z - u.z*v.y, u.z*v.x - u.x*v.z, u.x*v.y - u.y*v.x); }
        static random(min=0, max=1) { return new Vec3(min + Math.random()*(max-min), min + Math.random()*(max-min), min + Math.random()*(max-min)); }
        static randomInUnitSphere() {
            while (true) {
                let p = Vec3.random(-1, 1);
                if (p.lengthSq() < 1) return p;
            }
        }
        static randomUnitVector() { return Vec3.randomInUnitSphere().normalize(); }
        static reflect(v, n) { return v.sub(n.mul(2 * Vec3.dot(v, n))); }
        static refract(uv, n, etai_over_etat) {
            let cos_theta = Math.min(Vec3.dot(uv.mul(-1), n), 1.0);
            let r_out_perp = uv.add(n.mul(cos_theta)).mul(etai_over_etat);
            let r_out_parallel = n.mul(-Math.sqrt(Math.abs(1.0 - r_out_perp.lengthSq())));
            return r_out_perp.add(r_out_parallel);
        }
    }

    class Ray {
        constructor(origin, direction) { this.origin = origin; this.direction = direction; }
        at(t) { return this.origin.add(this.direction.mul(t)); }
    }

    class Material {
        emitted() { return new Vec3(0, 0, 0); }
        scatter(ray, rec) { return null; }
    }

    class Lambertian extends Material {
        constructor(albedo) { super(); this.albedo = albedo; }
        scatter(ray, rec) {
            let scatter_dir = rec.normal.add(Vec3.randomUnitVector());
            if (scatter_dir.lengthSq() < 1e-8) scatter_dir = rec.normal;
            return { ray: new Ray(rec.p, scatter_dir), attenuation: this.albedo };
        }
    }

    class Metal extends Material {
        constructor(albedo, fuzz) { super(); this.albedo = albedo; this.fuzz = fuzz < 1 ? fuzz : 1; }
        scatter(ray, rec) {
            let reflected = Vec3.reflect(ray.direction.normalize(), rec.normal);
            let scattered = new Ray(rec.p, reflected.add(Vec3.randomInUnitSphere().mul(this.fuzz)));
            if (Vec3.dot(scattered.direction, rec.normal) > 0) return { ray: scattered, attenuation: this.albedo };
            return null;
        }
    }

    class Dielectric extends Material {
        constructor(ir) { super(); this.ir = ir; }
        scatter(ray, rec) {
            let refraction_ratio = rec.front_face ? (1.0 / this.ir) : this.ir;
            let unit_direction = ray.direction.normalize();
            let cos_theta = Math.min(Vec3.dot(unit_direction.mul(-1), rec.normal), 1.0);
            let sin_theta = Math.sqrt(1.0 - cos_theta*cos_theta);
            
            let cannot_refract = refraction_ratio * sin_theta > 1.0;
            let direction;
            if (cannot_refract || this.reflectance(cos_theta, refraction_ratio) > Math.random()) {
                direction = Vec3.reflect(unit_direction, rec.normal);
            } else {
                direction = Vec3.refract(unit_direction, rec.normal, refraction_ratio);
            }
            return { ray: new Ray(rec.p, direction), attenuation: new Vec3(1.0, 1.0, 1.0) };
        }
        reflectance(cosine, ref_idx) {
            let r0 = (1 - ref_idx) / (1 + ref_idx);
            r0 = r0 * r0;
            return r0 + (1 - r0) * Math.pow((1 - cosine), 5);
        }
    }

    class DiffuseLight extends Material {
        constructor(color) { super(); this.color = color; }
        scatter(ray, rec) { return null; }
        emitted() { return this.color; }
    }

    class Quad {
        constructor(Q, u, v, material) {
            this.Q = Q; this.u = u; this.v = v; this.material = material;
            let n = Vec3.cross(u, v);
            this.normal = n.normalize();
            this.D = Vec3.dot(this.normal, Q);
            this.w = n.div(Vec3.dot(n, n));
        }
        hit(ray, t_min, t_max) {
            let denom = Vec3.dot(this.normal, ray.direction);
            if (Math.abs(denom) < 1e-8) return null;
            
            let t = (this.D - Vec3.dot(this.normal, ray.origin)) / denom;
            if (t < t_min || t > t_max) return null;
            
            let intersection = ray.at(t);
            let planar_hitpt_vector = intersection.sub(this.Q);
            let alpha = Vec3.dot(this.w, Vec3.cross(planar_hitpt_vector, this.v));
            let beta = Vec3.dot(this.w, Vec3.cross(this.u, planar_hitpt_vector));
            
            if (alpha < 0 || alpha > 1 || beta < 0 || beta > 1) return null;
            
            let front_face = Vec3.dot(ray.direction, this.normal) < 0;
            let normal = front_face ? this.normal : this.normal.mul(-1);
            
            return { t: t, p: intersection, normal: normal, front_face: front_face, material: this.material };
        }
    }

    class Sphere {
        constructor(center, radius, material) { this.center = center; this.radius = radius; this.material = material; }
        hit(ray, t_min, t_max) {
            let oc = ray.origin.sub(this.center);
            let a = ray.direction.lengthSq();
            let half_b = Vec3.dot(oc, ray.direction);
            let c = oc.lengthSq() - this.radius * this.radius;
            let discriminant = half_b * half_b - a * c;
            
            if (discriminant < 0) return null;
            let sqrtd = Math.sqrt(discriminant);
            let root = (-half_b - sqrtd) / a;
            
            if (root <= t_min || t_max <= root) {
                root = (-half_b + sqrtd) / a;
                if (root <= t_min || t_max <= root) return null;
            }
            
            let p = ray.at(root);
            let outward_normal = p.sub(this.center).div(this.radius);
            let front_face = Vec3.dot(ray.direction, outward_normal) < 0;
            let normal = front_face ? outward_normal : outward_normal.mul(-1);
            return { t: root, p: p, normal: normal, front_face: front_face, material: this.material };
        }
    }

    class HittableList {
        constructor() { this.objects = []; }
        add(obj) { this.objects.push(obj); }
        hit(ray, t_min, t_max) {
            let temp_rec = null;
            let closest_so_far = t_max;
            for (let obj of this.objects) {
                let rec = obj.hit(ray, t_min, closest_so_far);
                if (rec) { closest_so_far = rec.t; temp_rec = rec; }
            }
            return temp_rec;
        }
    }

    function rayColor(ray, world, depth) {
        if (depth <= 0) return new Vec3(0, 0, 0);
        let rec = world.hit(ray, 0.001, Infinity);
        if (!rec) return new Vec3(0, 0, 0); // Void background
        
        let emitted = rec.material.emitted();
        let scatterResult = rec.material.scatter(ray, rec);
        
        if (scatterResult) {
            let colorFromBounce = rayColor(scatterResult.ray, world, depth - 1);
            return emitted.add(scatterResult.attenuation.mulV(colorFromBounce));
        }
        return emitted;
    }

    function buildCornellBox(lightConfig, matConfig) {
        let world = new HittableList();
        
        let red   = new Lambertian(new Vec3(.65, .05, .05));
        let white = new Lambertian(new Vec3(.73, .73, .73));
        let green = new Lambertian(new Vec3(.12, .45, .15));
        
        let lightColor = new Vec3(lightConfig.r, lightConfig.g, lightConfig.b);
        let lightMat = new DiffuseLight(lightColor.mul(lightConfig.intensity));

        // Walls
        world.add(new Quad(new Vec3(555,0,0), new Vec3(0,555,0), new Vec3(0,0,555), green)); 
        world.add(new Quad(new Vec3(0,0,0), new Vec3(0,555,0), new Vec3(0,0,555), red));     
        world.add(new Quad(new Vec3(0,0,0), new Vec3(555,0,0), new Vec3(0,0,555), white));   
        world.add(new Quad(new Vec3(0,555,0), new Vec3(555,0,0), new Vec3(0,0,555), white)); 
        world.add(new Quad(new Vec3(0,0,555), new Vec3(555,0,0), new Vec3(0,555,0), white)); 
        world.add(new Quad(new Vec3(213,554,227), new Vec3(130,0,0), new Vec3(0,0,105), lightMat)); // Ceiling Light

        // Configurable Objects
        let leftMat = new Metal(new Vec3(0.8, 0.8, 0.9), matConfig.roughness);
        let rightMat = new Dielectric(matConfig.ior);
        
        world.add(new Sphere(new Vec3(180, 100, 350), 100, leftMat));  // Left Object (Further back)
        world.add(new Sphere(new Vec3(380, 100, 200), 100, rightMat)); // Right Object (Closer)

        return world;
    }

    self.onmessage = function(e) {
        const { startY, endY, width, height, samples, maxDepth, camParams, lightConfig, matConfig } = e.data;
        const buffer = new Uint8ClampedArray((endY - startY) * width * 4);
        const world = buildCornellBox(lightConfig, matConfig);

        let theta = camParams.vfov * Math.PI / 180.0;
        let h = Math.tan(theta/2);
        let viewport_height = 2.0 * h * camParams.focus_dist;
        let viewport_width = viewport_height * (width / height);

        let lookfrom = new Vec3(camParams.lookfrom.x, camParams.lookfrom.y, camParams.lookfrom.z);
        let lookat = new Vec3(camParams.lookat.x, camParams.lookat.y, camParams.lookat.z);
        let vup = new Vec3(camParams.vup.x, camParams.vup.y, camParams.vup.z);

        let w = lookfrom.sub(lookat).normalize();
        let u = Vec3.cross(vup, w).normalize();
        let v = Vec3.cross(w, u);

        let origin = lookfrom;
        let horizontal = u.mul(viewport_width);
        let vertical = v.mul(viewport_height);
        let lower_left_corner = origin.sub(horizontal.div(2)).sub(vertical.div(2)).sub(w.mul(camParams.focus_dist));

        for (let j = endY - 1; j >= startY; --j) {
            for (let i = 0; i < width; ++i) {
                let pixel_color = new Vec3(0, 0, 0);
                for (let s = 0; s < samples; ++s) {
                    let s_u = (i + Math.random()) / (width - 1);
                    let s_v = (j + Math.random()) / (height - 1);
                    
                    let dir = lower_left_corner.add(horizontal.mul(s_u)).add(vertical.mul(s_v)).sub(origin);
                    let r = new Ray(origin, dir);
                    pixel_color = pixel_color.add(rayColor(r, world, maxDepth));
                }
                
                let scale = 1.0 / samples;
                let c_r = Math.sqrt(pixel_color.x * scale);
                let c_g = Math.sqrt(pixel_color.y * scale);
                let c_b = Math.sqrt(pixel_color.z * scale);
                
                let canvasY = (endY - 1 - j);
                let ptr = (canvasY * width + i) * 4;
                buffer[ptr]   = 256 * Math.max(0.0, Math.min(0.999, c_r));
                buffer[ptr+1] = 256 * Math.max(0.0, Math.min(0.999, c_g));
                buffer[ptr+2] = 256 * Math.max(0.0, Math.min(0.999, c_b));
                buffer[ptr+3] = 255;
            }
        }
        self.postMessage({ startY, endY, buffer }, [buffer.buffer]);
    };
`;

const canvas = document.getElementById('renderCanvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');
const blob = new Blob([workerScript], { type: 'application/javascript' });
const workerUrl = URL.createObjectURL(blob);

// DOM Elements
const elements = {
    samples: document.getElementById('samplesSlider'),
    depth: document.getElementById('depthSlider'),
    intensity: document.getElementById('intensitySlider'),
    color: document.getElementById('lightColorPicker'),
    roughness: document.getElementById('roughnessSlider'),
    ior: document.getElementById('iorSlider')
};

let workers = [];
let activeWorkers = 0;

function hexToRgb(hex) {
    let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16) / 255,
        g: parseInt(result[2], 16) / 255,
        b: parseInt(result[3], 16) / 255
    } : { r: 1, g: 1, b: 1 };
}

function startRender() {
    workers.forEach(w => w.terminate());
    workers = [];
    activeWorkers = 0;

    const camParams = {
        lookfrom: {x: 278, y: 278, z: -800},
        lookat: {x: 278, y: 278, z: 0},
        vup: {x: 0, y: 1, z: 0},
        vfov: 40,
        focus_dist: 10.0,
        defocus_angle: 0.0
    };
    
    const rgb = hexToRgb(elements.color.value);
    const lightConfig = {
        intensity: parseFloat(elements.intensity.value),
        r: rgb.r, g: rgb.g, b: rgb.b
    };

    const matConfig = {
        roughness: parseFloat(elements.roughness.value),
        ior: parseFloat(elements.ior.value)
    };

    const samples = parseInt(elements.samples.value);
    const maxDepth = parseInt(elements.depth.value);
    const width = canvas.width;
    const height = canvas.height;
    
    const numCores = navigator.hardwareConcurrency || 4; 
    statusText.innerText = `Ray Tracing Scene... (${numCores} threads)`;
    let startTime = performance.now();
    const chunkHeight = Math.ceil(height / numCores);

    for (let i = 0; i < numCores; i++) {
        const worker = new Worker(workerUrl);
        workers.push(worker);
        const startY = i * chunkHeight;
        const endY = Math.min(startY + chunkHeight, height);
        if (startY >= height) break;

        activeWorkers++;
        worker.onmessage = (e) => {
            const { startY: retStartY, endY: retEndY, buffer } = e.data;
            const imageData = new ImageData(new Uint8ClampedArray(buffer), width, retEndY - retStartY);
            ctx.putImageData(imageData, 0, height - retEndY);
            
            activeWorkers--;
            if (activeWorkers === 0) {
                statusText.innerText = `Finished in ${((performance.now() - startTime) / 1000).toFixed(2)}s`;
            }
        };

        worker.postMessage({ startY, endY, width, height, samples, maxDepth, camParams, lightConfig, matConfig });
    }
}

// Bind Events dynamically
Object.keys(elements).forEach(key => {
    elements[key].addEventListener('change', (e) => {
        // Update text labels automatically if they exist
        const valSpan = document.getElementById(key + 'Val');
        if(valSpan) {
            // keep decimals for floats, ints for ints
            valSpan.innerText = e.target.step && e.target.step.includes('.') 
                ? parseFloat(e.target.value).toFixed(2) 
                : e.target.value;
        }
        startRender();
    });
});

startRender();
</script>
</body>
</html>
